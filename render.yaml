# Render deployment configuration — Backend API only
# Frontend is deployed on Vercel (see frontend/vercel.json)
#
# IMPORTANT: After deploying, set environment variables in Render dashboard:
#   SUPABASE_URL, SUPABASE_KEY, SUPABASE_SERVICE_KEY, GEMINI_API_KEY, FRONTEND_URL
#
# Note: Gemini AI validation requires a valid GEMINI_API_KEY.
# Without it, the app still works — MobileNet predictions function independently.

services:
  - type: web
    name: plantguard-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MODELS_DIR
        value: checkpoints
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/health
    plan: free
